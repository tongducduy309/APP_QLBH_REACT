<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' data:;"
  />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đang khởi động ứng dụng...</title>
  <style>
    :root {
      --bg-1: #fff8e1;
      --bg-2: #fde7c7;
      --card: rgba(255, 255, 255, 0.72);
      --card-border: rgba(255, 255, 255, 0.55);
      --text-main: #4e342e;
      --text-sub: #795548;
      --brand-1: #f4b400;
      --brand-2: #fb8c00;
      --track: rgba(251, 192, 45, 0.22);
      --shadow: 0 20px 45px rgba(91, 62, 43, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.65), transparent 34%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.28), transparent 28%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }

    .ambient {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .ambient::before,
    .ambient::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(18px);
      opacity: 0.28;
      animation: float 8s ease-in-out infinite;
    }

    .ambient::before {
      width: 220px;
      height: 220px;
      background: #ffd54f;
      top: -40px;
      left: -30px;
    }

    .ambient::after {
      width: 260px;
      height: 260px;
      background: #ffcc80;
      right: -50px;
      bottom: -60px;
      animation-delay: -3s;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(520px, calc(100vw - 40px));
      padding: 34px 30px 28px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      text-align: center;
      animation: cardIn 0.65s ease-out;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .logo {
      width: 92px;
      height: 92px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, var(--brand-1), var(--brand-2));
      box-shadow:
        0 12px 30px rgba(251, 140, 0, 0.28),
        inset 0 2px 6px rgba(255, 255, 255, 0.35);
      animation: pulse 2s ease-in-out infinite;
    }

    .logo svg {
      width: 46px;
      height: 46px;
      fill: #fff;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 10px 0 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-sub);
    }

    .status {
      margin-top: 22px;
      font-size: 13px;
      color: #8d6e63;
      min-height: 20px;
    }

    .progress {
      margin: 16px auto 0;
      width: 100%;
      max-width: 320px;
      height: 8px;
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
      position: relative;
    }

    .progress > span {
      position: absolute;
      inset: 0 auto 0 -35%;
      width: 35%;
      border-radius: inherit;
      background: linear-gradient(90deg, #fbc02d, #fb8c00);
      box-shadow: 0 0 10px rgba(251, 140, 0, 0.35);
      animation: loading 1.35s ease-in-out infinite;
    }

    .bottom {
      margin-top: 18px;
      font-size: 12px;
      color: rgba(93, 64, 55, 0.72);
    }

    .dots::after {
      content: "";
      display: inline-block;
      width: 1.2em;
      text-align: left;
      animation: dots 1.4s steps(4, end) infinite;
    }

    @keyframes loading {
      0% { left: -35%; }
      100% { left: 100%; }
    }

    @keyframes pulse {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-2px) scale(1.03); }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(12px) translateX(8px); }
    }

    @keyframes dots {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75% { content: "..."; }
      100% { content: ""; }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo,
      .progress > span,
      .ambient::before,
      .ambient::after,
      .dots::after,
      .card {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="ambient"></div>

  <main class="card" aria-label="Màn hình khởi động ứng dụng">
    <div class="logo-wrap">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M3 7.5 12 3l9 4.5v9L12 21l-9-4.5v-9Zm9-2.26L6.08 8.2 12 11.16 17.92 8.2 12 5.24ZM5 9.56v5.71l6 3v-5.71l-6-3Zm8 8.71 6-3V9.56l-6 3v5.71Z"/>
        </svg>
      </div>
    </div>

    <h1>Quản Lý Bán Hàng</h1>
    <p class="subtitle">
      Ứng dụng đang khởi động hệ thống và kết nối dữ liệu.
      Vui lòng chờ trong giây lát.
    </p>

    <div class="status">
      Đang tải ứng dụng<span class="dots"></span>
    </div>

    <div class="progress" aria-hidden="true">
      <span></span>
    </div>

    <div class="bottom">
      Đang chuẩn bị giao diện làm việc
    </div>
  </main>
</body>
</html>
